name: Refresh TrackAIPAC parity

# Mirrors the FEC refresh pattern, but the TrackAIPAC scrape is a single
# server-rendered page fetch (no per-member API calls), so it is fast and
# needs no long timeout or skip list. TrackAIPAC updates daily; so do we.

on:
  schedule:
    - cron: "30 9 * * *"      # 09:30 UTC daily
  workflow_dispatch: {}        # manual run button

permissions:
  contents: write

concurrency:
  group: refresh-trackaipac
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 1. Scrape TrackAIPAC's published per-member "Israel Lobby Total".
      #    Self-aborts if < 480 members parse, so a bad scrape can never
      #    overwrite good data with a partial set.
      - name: Scrape TrackAIPAC
        run: python3 scripts/scrape_trackaipac.py

      # 2. Force fec.json + index.html + aipac.json to 1:1 with TrackAIPAC.
      #    Unmatched members are preserved and listed in the change log.
      - name: Apply 1:1 parity
        run: python3 scripts/apply_trackaipac_parity.py

      # 3. Enforce the contract. H2b fails the build if anything is not 1:1
      #    when the TrackAIPAC source is present.
      - name: Validate (enforces 1:1)
        run: python3 validate.py index.html . data/raw/trackaipac.json

      - name: Show change summary
        if: always()
        run: |
          echo "----- parity change log (head) -----"
          head -n 40 data/raw/parity_change_log.txt || true

      # 4. Commit only if something actually changed.
      - name: Commit refreshed data
        run: |
          git config user.name  "trackaipac-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/fec.json data/aipac.json index.html \
                  data/raw/trackaipac.json data/raw/trackaipac_page.txt \
                  data/raw/parity_change_log.txt
          if git diff --cached --quiet; then
            echo "No changes — TrackAIPAC already 1:1."
          else
            git commit -m "chore: refresh TrackAIPAC 1:1 parity [skip ci]"
            git push
          fi
