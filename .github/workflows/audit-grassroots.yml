name: Audit Grassroots List

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run grassroots audit
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
        run: python3 scripts/audit_grassroots.py

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grassroots-audit-report
          path: audit_grassroots_report.md
