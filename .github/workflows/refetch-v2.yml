name: Refetch Outside Spending v2 (FIX double-counting)

# CORRECTED outside spending refetch using FEC's pre-aggregated 
# /schedules/schedule_e/by_candidate/ endpoint.
# 
# Fixes the double/triple-counting bug from the original refetch that 
# inflated numbers like Warnock's $324M (real: ~$146M) because the raw 
# schedule_e endpoint includes memo entries and amended filings.
# 
# This refetches ALL 538 members. Estimated runtime: 60-90 minutes.

on:
  workflow_dispatch:

jobs:
  refetch-v2:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --upgrade pip

      - name: Refetch ALL members (corrected aggregation)
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
        run: python3 scripts/refetch_outside_spending_v2.py --all

      - name: Commit fixes
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --soft origin/main
          git add data/outside_spending.json data/outside_spending.json.before_v2
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Fix double-counting in outside spending (use by_candidate aggregated endpoint)"
            git push origin main
          fi
