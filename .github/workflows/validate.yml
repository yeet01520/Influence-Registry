name: Data Integrity Check

on:
  push:
    paths:
      - 'index.html'
  pull_request:
    paths:
      - 'index.html'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Debug — list files in repo
        run: |
          echo "=== Files in repo root ==="
          ls -la
          echo ""
          echo "=== Looking for any HTML files anywhere ==="
          find . -name "*.html" -not -path "./.git/*"
          echo ""
          echo "=== Looking for trackaipac ==="
          find . -name "trackaipac*" -not -path "./.git/*"

      - name: Run data validator
        run: |
          python3 validate.py index.html . trackaipac_page.txt

      - name: Post validation summary
        if: failure()
        run: echo "Data validation failed. Check errors above before deploying."
