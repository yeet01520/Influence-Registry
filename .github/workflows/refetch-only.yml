name: Refetch Outside Spending (manual list)

# Manually-triggered workflow to refetch Schedule E outside spending
# for members listed in data/members_to_refetch.json.
#
# Use this when:
#   - You've manually added members to members_to_refetch.json
#   - You want to refresh data for specific members without re-running
#     the full audit workflow

on:
  workflow_dispatch:

jobs:
  refetch:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --upgrade pip

      - name: Refetch Schedule E for members in refetch list
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
        run: python3 scripts/refetch_outside_spending.py

      - name: Commit fixes
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --soft origin/main
          git add data/outside_spending.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Refetch outside spending for members in members_to_refetch.json"
            git push origin main
          fi
