name: Structural ID Cleanup & Refetch

# Follow-up cleanup pass that:
#   1. Drops any candidate_id whose office/state doesn't match the member's
#      actual office/state (purely structural — no API needed)
#   2. Re-fetches Schedule E for any member whose primary changed
#
# Use this AFTER audit-fix.yml has run. Catches the ~35 members where
# the audit's name-matching failed (Ted Cruz, Pablo Hernández with diacritic, etc.)

on:
  workflow_dispatch:

jobs:
  structural-cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --upgrade pip

      - name: Structural cleanup (no API needed)
        run: python3 scripts/structural_id_cleanup.py

      - name: Refetch Schedule E for newly affected members
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
        run: python3 scripts/refetch_outside_spending.py

      - name: Commit fixes
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Fetch latest remote state
          git fetch origin main
          # Reset local main to remote (clean slate)
          git reset --soft origin/main
          # Now stage and commit our changes on top
          git add data/fec.json data/outside_spending.json data/structural_cleanup_report.md data/members_to_refetch.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Structural ID cleanup + refetch (drops cross-state/cross-office contamination)"
            git push origin main
          fi
