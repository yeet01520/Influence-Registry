name: Refresh FEC Data (All Members)

# Run only when manually triggered from the Actions tab
on:
  workflow_dispatch:

jobs:
  refresh-fec-all:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # v7 takes 30-90 min for all 538 members; allow generous headroom
    permissions:
      contents: write      # needed so the workflow can commit the updated JSON

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run v7 FEC pull for all members
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
        run: python3 scripts/run_v7_for_all.py

      - name: Merge into data/fec.json
        # Preserves any Cabinet entries (Rubio, Vance) that were merged
        # in by run_v7_for_cabinet → merge_fec_data flow. Cabinet members
        # aren't in members.json, so they wouldn't be touched by the all-
        # members run; this just makes sure they survive when we write
        # the new fec.json.
        run: |
          python3 << 'PY'
          import json, os
          from pathlib import Path

          repo = Path('.').resolve()
          all_new = repo / 'data' / 'raw' / 'all_fec_data.json'
          fec_main = repo / 'data' / 'fec.json'

          if not all_new.exists():
              raise SystemExit(f"ERROR: {all_new} not produced by v7 run")

          new_data = json.loads(all_new.read_text())
          print(f"Loaded {len(new_data)} members from all_fec_data.json")

          # Preserve any existing entries in fec.json that aren't in the new
          # all-members data (most likely: Cabinet members like Rubio, Vance)
          existing = {}
          if fec_main.exists():
              existing = json.loads(fec_main.read_text())
              preserved = [k for k in existing if k not in new_data]
              if preserved:
                  print(f"Preserving {len(preserved)} entries not in new data: {preserved}")
                  for k in preserved:
                      new_data[k] = existing[k]

          fec_main.write_text(json.dumps(new_data, indent=2))
          print(f"Wrote {len(new_data)} entries to {fec_main}")
          PY

      - name: Run data quality check
        # Non-blocking: report any name collisions but don't fail the workflow.
        # If new collisions appear they need investigation, not auto-rollback.
        run: |
          if [ -f scripts/check_data_quality.py ]; then
            python3 scripts/check_data_quality.py data/fec.json || true
          else
            echo "check_data_quality.py not present; skipping"
          fi

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fec.json data/raw/all_fec_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Refresh FEC data for all members via v7 (auto)"
            # Pull any commits that landed while we were running, then push
            git pull --rebase origin main
            git push
          fi
